<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Sign In — LogicPals</title>

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma"        content="no-cache" />
  <meta http-equiv="Expires"       content="0" />

  <link rel="stylesheet" href="/assets/css/admin.css" />
  <script src="/assets/js/env-loader.js"></script>
  <script src="/assets/js/admin-auth.js"></script>
</head>

<body>
  <!-- Toast stack rendered by LPAdmin -->

  <div class="admin-login-page">
    <div class="admin-login-wrap">

      <!-- Brand -->
      <div class="admin-login-brand">
        <div class="admin-login-logo">LP</div>
        <div>
          <div class="admin-login-brand-name">LogicPals</div>
          <div class="admin-login-brand-sub">Admin Console</div>
        </div>
      </div>

      <!-- Card -->
      <div class="admin-login-card">
        <h1 class="admin-login-title">Sign in</h1>
        <p class="admin-login-subtitle">Admin access is enforced by DB roles + RPC gates.</p>

        <!-- Status pill -->
        <div class="admin-login-status">
          <div class="admin-pill" id="statusPill">
            <span class="admin-dot" id="dot"></span>
            <span id="statusTxt">Checking session…</span>
          </div>
        </div>

        <!-- Form -->
        <form id="loginForm" autocomplete="on" novalidate>
          <div class="admin-login-fields">

            <div class="admin-field">
              <label class="admin-label" for="email">Email</label>
              <input
                class="admin-input"
                id="email"
                type="email"
                placeholder="admin@logicpals.com"
                autocomplete="username"
                required
              />
            </div>

            <div class="admin-field">
              <label class="admin-label" for="password">Password</label>
              <input
                class="admin-input"
                id="password"
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
            </div>

          </div><!-- /.admin-login-fields -->

          <div class="admin-login-actions">
            <button
              class="admin-btn admin-btn-primary admin-btn-lg"
              id="btnLogin"
              type="submit"
              style="flex:1"
            >
              Sign In
            </button>
            <button
              class="admin-btn admin-btn-secondary admin-btn-lg"
              id="btnClear"
              type="button"
            >
              Clear
            </button>
          </div>

          <!-- Inline message (error / success) -->
          <div class="admin-login-msg" id="loginMsg"></div>

          <!-- Footer links -->
          <div class="admin-login-footer">
            <a href="/index.html">← Back to Home</a>
            <a href="/admin.html">Go to Console →</a>
          </div>
        </form>

        <p class="admin-login-tip">
          Tip: if you were signed out unexpectedly, try Ctrl+R to clear cached state.
        </p>
      </div>
      <!-- /.admin-login-card -->

    </div>
  </div><!-- /.admin-login-page -->

  <script type="module">
    /* ── Constants ─────────────────────────────────────────────── */
    const ADMIN_ROLES = new Set([
      'super_admin', 'admin_regular', 'admin_olympiad',
      'support_readonly', 'reviewer', 'admin',
    ]);

    const SB_CDN = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';

    /* ── DOM refs ───────────────────────────────────────────────── */
    const $   = id => document.getElementById(id);
    const btn = $('btnLogin');
    const msg = $('loginMsg');

    /* ── Helpers ────────────────────────────────────────────────── */
    function setStatus(kind, text) {
      // Delegate to LPAdmin which knows the dot/statusTxt IDs
      if (window.LPAdmin) LPAdmin.setStatus(kind, text);
    }

    function showMsg(type, text) {
      msg.className = `admin-login-msg ${type === 'err' ? 'err' : 'ok'}`;
      msg.textContent = text;
    }

    function hideMsg() {
      msg.className = 'admin-login-msg';
      msg.textContent = '';
    }

    /* ── Supabase bootstrap (lean — login page only) ─────────────── */
    async function loadSbLib() {
      if (window.supabase?.createClient) return window.supabase;
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src     = SB_CDN;
        s.async   = true;
        s.onload  = () => window.supabase?.createClient ? resolve(window.supabase) : reject(new Error('sb_load_failed'));
        s.onerror = () => reject(new Error('sb_cdn_unreachable'));
        document.head.appendChild(s);
      });
    }

    async function getClient() {
      if (window.__LP_ADMIN_SB) return window.__LP_ADMIN_SB;
      const env = await window.__LP_GET_ENV();
      if (!env?.SUPABASE_URL || !env?.SUPABASE_ANON_KEY) {
        throw new Error('Supabase config missing. Check /api/env and Vercel env vars.');
      }
      const lib = await loadSbLib();
      window.__LP_ADMIN_SB = lib.createClient(env.SUPABASE_URL, env.SUPABASE_ANON_KEY, {
        auth: {
          storageKey:         'lp_admin_auth',
          persistSession:     true,
          autoRefreshToken:   true,
          detectSessionInUrl: false,
        },
      });
      return window.__LP_ADMIN_SB;
    }

    async function resolveRole(sb) {
      const candidates = [
        'rpc_lp_my_role', 'get_my_role', 'rp_get_my_role',
        'admin_get_role', 'rp_admin_get_user_role',
      ];
      for (const fn of candidates) {
        try {
          const { data, error } = await sb.rpc(fn);
          if (!error) {
            if (typeof data === 'string') return data.trim();
            if (data && typeof data === 'object')
              return String(data.role || data.current_role || data.name || 'no_role').trim();
            return 'no_role';
          }
        } catch (_) {}
      }
      return 'no_role';
    }

    /* ── Check existing session on load ──────────────────────────── */
    async function checkExistingSession() {
      setStatus('warn', 'Checking session…');

      try {
        const sb = await getClient();
        const { data: { session } } = await sb.auth.getSession();

        if (!session) {
          setStatus('idle', 'Ready');
          // Show success msg if coming from sign-out redirect
          const params = new URLSearchParams(window.location.search);
          if (params.get('logged_out') === '1') {
            showMsg('ok', 'Signed out successfully.');
          }
          return;
        }

        // Already signed in — verify role
        setStatus('warn', 'Verifying role…');
        const role = await resolveRole(sb);

        if (ADMIN_ROLES.has(role)) {
          setStatus('ok', 'Authorized');
          showMsg('ok', `Already signed in as ${role}. Redirecting to console…`);
          setTimeout(() => window.location.replace('/admin.html'), 900);
        } else {
          // Signed in but not an admin — sign out and let them try again
          await sb.auth.signOut();
          setStatus('idle', 'Ready');
          showMsg('err', `Your account (role: "${role}") is not authorised for admin access.`);
        }
      } catch (e) {
        setStatus('err', 'Config error');
        showMsg('err', `Startup error: ${e?.message || e}`);
      }
    }

    /* ── Login form submit ───────────────────────────────────────── */
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();

      const email    = ($('email').value   || '').trim();
      const password =  $('password').value || '';

      if (!email || !password) {
        showMsg('err', 'Please enter your email and password.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      setStatus('warn', 'Authenticating…');

      try {
        // Use LPAdmin.signIn which handles env + supabase init + role gate
        const result = await LPAdmin.signIn(email, password);

        if (!result.ok) {
          setStatus('idle', 'Ready');
          showMsg('err', result.error || 'Sign in failed. Check your credentials.');
          return;
        }

        setStatus('ok', 'Authorized');
        showMsg('ok', `Welcome. Role: ${result.role}. Redirecting…`);

        setTimeout(() => window.location.replace('/admin.html'), 700);

      } catch (err) {
        setStatus('err', 'Error');
        showMsg('err', err?.message || String(err));
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    /* ── Clear button ────────────────────────────────────────────── */
    $('btnClear').addEventListener('click', () => {
      $('email').value    = '';
      $('password').value = '';
      hideMsg();
      $('email').focus();
    });

    /* ── Enter key in email field moves to password ─────────────── */
    $('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); $('password').focus(); }
    });

    /* ── Boot ────────────────────────────────────────────────────── */
    checkExistingSession();
  </script>
</body>
</html>
